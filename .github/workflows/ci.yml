# ============================================================
# MammasTale CI Pipeline
# Shankar: "가장 과소평가된 기능. PR 시 자동 검증 필수"
# Red Hat: "스펙과 코드 모두 CI에서 검증"
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─── 1단계: 빌드 + 테스트 ───
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build (Edge Runtime)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_APP_URL: "https://mamastale-global.pages.dev"

  # ─── 2단계: 보안 검사 ───
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      # 위기감지 키워드 변경 감지 (Shankar 패턴)
      - name: Crisis detection regression check
        run: |
          if git diff --name-only HEAD~1 2>/dev/null | grep -q "system-prompt.ts"; then
            echo "⚠️ WARNING: system-prompt.ts was modified!"
            echo "위기감지 키워드 변경은 임상 전문가 검토가 필요합니다."
            echo "::warning file=src/lib/anthropic/system-prompt.ts::Crisis detection keywords modified - requires clinical review"
          fi

      # 환경변수 유출 검사
      - name: Check for leaked secrets
        run: |
          if grep -rn "sk-ant-\|sk_live_\|sk_test_\|SUPABASE_SERVICE_ROLE" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null; then
            echo "❌ CRITICAL: Potential secret leak detected!"
            exit 1
          fi
          echo "✅ No leaked secrets found"

  # ─── 3단계: 마이그레이션 변경 감지 ───
  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check migration changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'supabase/migrations/' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "📦 Database migrations changed:"
            echo "$CHANGED"
            echo ""
            echo "::warning::Database migration files were modified. Ensure migrations are tested against a staging database before merging."
          fi
